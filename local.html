<head>

    <title>WDD 131 – Fundamentos da Web Dinâmica - João Augusto Anselmo Moraes Ferreira</title>
    <meta name="description"
        content="WDD 131 – Fundamentos da Web Dinâmica, por João Augusto Anselmo Moraes Ferreira.">

    <script src="scripts/local.js" defer></script>

    <link rel="stylesheet" href="estilos/local.css">

<body>
    <header>
        <h1>Brasil</h1>
    </header>

    <main>
        <section class="dados">
            <h2>Dados</h2>
            <p><span class="rotulo">Capital:</span> <span class="valor">Brasília</span></p>
            <p><span class="rotulo">Idioma:</span> <span class="valor">Português</span></p>
            <p><span class="rotulo">Moeda:</span> <span class="valor">Real (R$)</span></p>

            <p><span class="rotulo">Fuso horário:</span> <span class="valor">UTC-3</span></p>
        </section>
          <picture class="imagem-principal">
           <source media="(min-width: 600px)" srcset="imagens/brasil.webp">
           <img src="imagens/brasil.webp" alt="Paisagem do Brasil" width="800" height="600">
         </picture>

        <section class="clima">
            <h2>Clima <img src="imagens/clima.svg" alt="Ícone do clima" class="icone-clima-mobile"></h2>
            <p><span class="rotulo">Temperatura:</span> <span class="valor" id="temperatura"></span></p>
            <p><span class="rotulo">Vento:</span> <span class="valor" id="vento"></span></p>
            <p><span class="rotulo">Sensação térmica:</span> <span class="valor" id="sensacaoTermica"></span></p>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="anoatual"></span> João Augusto Anselmo Moraes Ferreira São Paulo</p>
        <p id="ultimamodificacao"></p>
